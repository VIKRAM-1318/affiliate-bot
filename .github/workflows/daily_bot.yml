name: 🤖 Daily Affiliate Bot

on:
  schedule:
    # Runs every day at 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run affiliate bot
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_JSON:   ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          BLOGGER_BLOG_ID:           ${{ secrets.BLOGGER_BLOG_ID }}
          PINTEREST_ACCESS_TOKEN:    ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID:        ${{ secrets.PINTEREST_BOARD_ID }}
          AMAZON_ASSOCIATE_ID:       ${{ secrets.AMAZON_ASSOCIATE_ID }}
          BLOG_URL:                  ${{ secrets.BLOG_URL }}
        run: python main.py

      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: run-logs-${{ github.run_number }}
          path: logs/run_log.json
          retention-days: 30
